<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#13110f">
<title>Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#13110f; --panel:#1c1916; --panel-2:#231f1b;
    --line:#322c26; --ink:#efe9e0; --ink-dim:#a89e90; --ink-faint:#6f665b;
    --accent:#e0a45e; --accent-soft:#c98a44; --event:#6fa8a0; --new:#e0a45e;
    --r:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--ink);font-family:"Spline Sans Mono",ui-monospace,monospace}
  body{
    min-height:100vh;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    background-image:radial-gradient(120% 80% at 50% -10%, #211c17 0%, var(--bg) 60%);
  }
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px 90px}

  header{display:flex;align-items:baseline;justify-content:space-between;margin:6px 2px 16px}
  h1{font-family:"Fraunces",serif;font-weight:600;font-size:30px;letter-spacing:-.01em}
  .stamp{font-size:11px;color:var(--ink-faint);letter-spacing:.04em}

  /* tabs */
  .tabs{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 12px;scrollbar-width:none;position:sticky;top:0;
        background:linear-gradient(var(--bg) 70%, transparent);z-index:5}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;position:relative;border:1px solid var(--line);background:var(--panel);
       color:var(--ink-dim);padding:9px 14px;border-radius:999px;font-size:13px;letter-spacing:.01em;
       cursor:pointer;transition:.18s;white-space:nowrap}
  .tab[aria-selected="true"]{background:var(--ink);color:#1a1714;border-color:var(--ink);font-weight:500}
  .tab .dot{position:absolute;top:6px;right:8px;width:7px;height:7px;border-radius:50%;
            background:var(--new);box-shadow:0 0 0 3px var(--panel)}
  .tab[aria-selected="true"] .dot{box-shadow:0 0 0 3px var(--ink)}

  /* list */
  .list{display:flex;flex-direction:column;gap:9px;margin-top:6px}
  .empty{color:var(--ink-faint);text-align:center;padding:48px 0;font-size:13px;line-height:1.6}
  .item{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
        padding:14px 15px 14px 17px;overflow:hidden;animation:rise .35s both}
  .item::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
  .item.event::before{background:var(--event)}
  .item .top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .title{font-size:14.5px;line-height:1.4;color:var(--ink);letter-spacing:.005em}
  .meta{display:flex;gap:10px;align-items:center;margin-top:9px;font-size:11px;color:var(--ink-faint)}
  .pill{font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:3px 7px;border-radius:6px;
        border:1px solid var(--line);color:var(--ink-dim)}
  .pill.event{color:var(--event);border-color:#2f4845}
  .when{color:var(--ink-dim)}
  .when.soon{color:var(--accent)}
  .when.past{color:#c96b5e}
  .src{color:var(--ink-faint);font-size:11px;margin-top:7px;display:flex;gap:6px;align-items:center}
  .src::before{content:"↳";color:var(--ink-faint)}
  .rank{font-family:"Fraunces",serif;font-size:13px;color:var(--ink-faint);min-width:20px;text-align:right;padding-top:1px}

  /* this-week grouping */
  .group-label{font-family:"Fraunces",serif;font-size:12px;color:var(--ink-faint);letter-spacing:.06em;
               text-transform:uppercase;margin:18px 4px 4px}
  .wf-tag{font-size:10px;color:var(--ink-faint);letter-spacing:.04em}

  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .bar{position:fixed;left:0;right:0;bottom:0;display:flex;justify-content:center;gap:6px;
       padding:10px 0 calc(10px + env(safe-area-inset-bottom));
       background:linear-gradient(transparent, var(--bg) 40%);font-size:11px;color:var(--ink-faint)}
  .refresh{background:none;border:1px solid var(--line);color:var(--ink-dim);border-radius:999px;
           padding:6px 13px;font-family:inherit;font-size:11px;cursor:pointer}
  .err{color:#c96b5e;font-size:11px;text-align:center;padding:6px}

  /* login */
  #login{display:none;flex-direction:column;gap:12px;max-width:320px;margin:64px auto 0;text-align:center}
  #login h2{font-family:"Fraunces",serif;font-weight:600;font-size:26px}
  #login p{color:var(--ink-dim);font-size:12.5px;line-height:1.6}
  #login input{background:var(--panel);border:1px solid var(--line);color:var(--ink);
       border-radius:10px;padding:12px 14px;font-family:inherit;font-size:15px;text-align:center;letter-spacing:.02em;width:100%}
  #login input.code{letter-spacing:8px;font-size:22px}
  #login button.primary{background:var(--ink);color:#1a1714;border:none;border-radius:999px;
       padding:11px 14px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer}
  #login button.primary:disabled{opacity:.5}
  #login .linkbtn{background:none;border:none;color:var(--ink-faint);font-size:11px;cursor:pointer;text-decoration:underline}
  #login .msg{font-size:11.5px;min-height:15px;color:var(--ink-dim)}
  #login .msg.bad{color:#c96b5e}
  #login .msg.ok{color:var(--event)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Ledger</h1>
    <span class="stamp" id="stamp"></span>
  </header>
  <nav class="tabs" id="tabs" role="tablist"></nav>
  <main class="list" id="list" aria-live="polite"></main>
  <div class="err" id="err"></div>
  <div id="login">
    <h2>Ledger</h2>
    <p id="login-step1-text">Enter your email to get a one-time sign-in code.</p>
    <input id="login-email" type="email" inputmode="email" autocomplete="email" placeholder="you@example.com">
    <button id="send-code" class="primary">Send code</button>
    <input id="login-code" class="code" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="000000" style="display:none">
    <button id="verify-code" class="primary" style="display:none">Verify &amp; sign in</button>
    <button id="login-back" class="linkbtn" style="display:none">Use a different email</button>
    <div class="msg" id="login-msg"></div>
  </div>
</div>
<div class="bar">
  <span id="status">read-only · synced from Cowork</span>
  <button class="refresh" id="refresh">refresh</button>
  <button class="refresh" id="signout">sign out</button>
</div>

<script>
/* ============================================================
   CONFIG — fill these in after you create the Supabase project.
   Until then the app runs on MOCK data so you can see the layout.
   ============================================================ */
const SUPABASE_URL  = "https://kurgccxdccjbkaxugepw.supabase.co";   // project URL
const SUPABASE_ANON = "sb_publishable_8qUHVSNBWLHl9wwIPD70Sw_6I2ZoUnD";   // publishable (read-only) key
/* ============================================================ */

const LS_KEY = "ledger:lastSeen";  // per-workflow last-viewed timestamps

const MOCK = {
  workflows:[
    {id:"w1",name:"Day Surgery",sort_order:1},
    {id:"w2",name:"Private Practice",sort_order:2},
    {id:"w3",name:"Hospital Build",sort_order:3},
    {id:"w4",name:"InSafe",sort_order:4},
    {id:"w5",name:"Equipment",sort_order:5},
    {id:"w6",name:"Music",sort_order:6},
    {id:"w7",name:"Life Admin",sort_order:7},
  ],
  items:[
    {id:"i1",workflow_id:"w1",type:"task",title:"Confirm UEScope VL-400 quote with Multigate",sort_order:1,date:isoIn(2),source:"Multigate — Re: VL-400 pricing",updated_at:isoIn(0)},
    {id:"i2",workflow_id:"w1",type:"task",title:"Finalise reusable-blade sterilisation workflow",sort_order:2,date:isoIn(6),source:null,updated_at:isoIn(-2)},
    {id:"i3",workflow_id:"w1",type:"event",title:"Theatre fit-out site walkthrough",sort_order:3,date:isoIn(4),source:null,updated_at:isoIn(-3)},
    {id:"i4",workflow_id:"w3",type:"task",title:"Call Credabl re: green loan stacking",sort_order:1,date:isoIn(1),source:"Credabl — intro call",updated_at:isoIn(0)},
    {id:"i5",workflow_id:"w3",type:"task",title:"Decide 5★ vs 6★ Green Star cost-benefit",sort_order:2,date:isoIn(9),source:null,updated_at:isoIn(-5)},
    {id:"i6",workflow_id:"w4",type:"task",title:"Run InSafe novelty screen on PQAI",sort_order:1,date:isoIn(3),source:null,updated_at:isoIn(-1)},
    {id:"i7",workflow_id:"w7",type:"event",title:"Christening — bring card (\u00c1\u03be\u03b9\u03bf\u03c2)",sort_order:1,date:isoIn(5),source:null,updated_at:isoIn(-4)},
    {id:"i8",workflow_id:"w7",type:"task",title:"Order cotton scrubs — Percent Apparel (US)",sort_order:2,date:isoIn(8),source:null,updated_at:isoIn(-6)},
    {id:"i9",workflow_id:"w2",type:"task",title:"Lodge ARTG paperwork follow-up",sort_order:1,date:isoIn(0),source:"TGA portal notice",updated_at:isoIn(0)},
  ]
};
function isoIn(days){const d=new Date();d.setDate(d.getDate()+days);return d.toISOString();}

let DATA={workflows:[],items:[]};
let active=null;
const AGENDA="__week__";

/* ---- auth: passwordless email one-time-code ---- */
const SESS_KEY="ledger:session";
let PENDING_EMAIL="";
function el(id){return document.getElementById(id);}
function getSession(){try{return JSON.parse(localStorage.getItem(SESS_KEY))}catch{return null}}
function setSession(s){ s?localStorage.setItem(SESS_KEY,JSON.stringify(s)):localStorage.removeItem(SESS_KEY); }
function saveAuth(d){
  const now=Math.floor(Date.now()/1000);
  setSession({access_token:d.access_token,refresh_token:d.refresh_token,
              expires_at:d.expires_at||(now+(d.expires_in||3600))});
}
async function validToken(){
  const s=getSession(); if(!s||!s.access_token) return null;
  const now=Math.floor(Date.now()/1000);
  if(s.expires_at && s.expires_at-60>now) return s.access_token;   // still valid
  if(s.refresh_token){                                             // try silent refresh
    try{
      const r=await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`,
        {method:"POST",headers:{apikey:SUPABASE_ANON,"Content-Type":"application/json"},
         body:JSON.stringify({refresh_token:s.refresh_token})});
      if(r.ok){const d=await r.json(); saveAuth(d); return d.access_token;}
    }catch(e){}
  }
  setSession(null); return null;
}
function showLogin(){
  el("tabs").style.display="none"; el("list").style.display="none";
  el("status").textContent="not signed in"; el("signout").style.display="none";
  el("login").style.display="flex";
}
function hideLogin(){
  el("login").style.display="none";
  el("tabs").style.display=""; el("list").style.display="";
  el("status").textContent="read-only · synced from Cowork"; el("signout").style.display="";
}
function resetLoginUI(){
  el("login-email").style.display=""; el("send-code").style.display="";
  el("login-code").style.display="none"; el("verify-code").style.display="none";
  el("login-back").style.display="none"; el("login-code").value="";
  el("login-step1-text").textContent="Enter your email to get a one-time sign-in code.";
  el("login-msg").textContent=""; el("login-msg").className="msg";
}
async function requestCode(){
  const email=el("login-email").value.trim(); const msg=el("login-msg"); msg.className="msg";
  if(!email){msg.className="msg bad";msg.textContent="Enter your email.";return;}
  el("send-code").disabled=true; msg.textContent="Sending…";
  try{
    const r=await fetch(`${SUPABASE_URL}/auth/v1/otp`,
      {method:"POST",headers:{apikey:SUPABASE_ANON,"Content-Type":"application/json"},
       body:JSON.stringify({email,create_user:true})});
    if(!r.ok){const d=await r.json().catch(()=>({})); throw new Error(d.msg||d.error_description||("HTTP "+r.status));}
    PENDING_EMAIL=email;
    el("login-email").style.display="none"; el("send-code").style.display="none";
    el("login-step1-text").textContent="Enter the 6-digit code emailed to "+email+".";
    el("login-code").style.display=""; el("verify-code").style.display="";
    el("login-back").style.display=""; el("login-code").focus();
    msg.className="msg ok"; msg.textContent="Code sent — check your email.";
  }catch(e){ msg.className="msg bad"; msg.textContent="Couldn't send code: "+e.message; }
  el("send-code").disabled=false;
}
async function verifyCode(){
  const token=el("login-code").value.trim(); const msg=el("login-msg"); msg.className="msg";
  if(!/^\d{6}$/.test(token)){msg.className="msg bad";msg.textContent="Enter the 6-digit code.";return;}
  el("verify-code").disabled=true; msg.textContent="Verifying…";
  try{
    const r=await fetch(`${SUPABASE_URL}/auth/v1/verify`,
      {method:"POST",headers:{apikey:SUPABASE_ANON,"Content-Type":"application/json"},
       body:JSON.stringify({type:"email",email:PENDING_EMAIL,token})});
    const d=await r.json().catch(()=>({}));
    if(!r.ok||!d.access_token) throw new Error(d.msg||("HTTP "+r.status));
    saveAuth(d); resetLoginUI(); hideLogin(); load();
  }catch(e){ msg.className="msg bad"; msg.textContent="Invalid or expired code."; el("verify-code").disabled=false; }
}
function signOut(){ setSession(null); resetLoginUI(); showLogin(); }

async function load(){
  const err=el("err"); err.textContent="";
  const tok=await validToken();
  if(!tok){ showLogin(); return; }
  hideLogin();
  try{
    const h={apikey:SUPABASE_ANON,Authorization:"Bearer "+tok};
    const [w,i]=await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/workflow?select=*&order=sort_order`,{headers:h}),
      fetch(`${SUPABASE_URL}/rest/v1/item?select=*&order=sort_order`,{headers:h}),
    ]);
    if(w.status===401||i.status===401){ setSession(null); showLogin(); return; }
    if(!w.ok||!i.ok) throw new Error("HTTP "+w.status+"/"+i.status);
    DATA={workflows:await w.json(),items:await i.json()};
  }catch(e){ err.textContent="Couldn't reach the database. ("+e.message+")"; return; }
  if(active===null) active=AGENDA;
  render();
}

function lastSeen(){try{return JSON.parse(localStorage.getItem(LS_KEY))||{}}catch{return{}}}
function markSeen(wfId){const s=lastSeen();s[wfId]=new Date().toISOString();localStorage.setItem(LS_KEY,JSON.stringify(s));}
function hasNew(wfId){
  const s=lastSeen()[wfId]; if(!s) return DATA.items.some(it=>it.workflow_id===wfId);
  return DATA.items.some(it=>it.workflow_id===wfId && it.updated_at>s);
}

function fmtWhen(iso,type){
  if(!iso) return null;            // undated tasks: no "when" pill
  const d=new Date(iso),now=new Date();
  const days=Math.round((d-new Date(now.getFullYear(),now.getMonth(),now.getDate()))/86400000);
  const lbl=d.toLocaleDateString(undefined,{day:"numeric",month:"short"});
  let rel,cls="";
  if(days<0){rel="overdue";cls="past";}
  else if(days===0){rel="today";cls="soon";}
  else if(days===1){rel="tomorrow";cls="soon";}
  else if(days<=3){rel=`in ${days}d`;cls="soon";}
  else rel=`in ${days}d`;
  return {text:`${lbl} · ${rel}`,cls};
}

function itemEl(it,showWf){
  const el=document.createElement("div");
  el.className="item"+(it.type==="event"?" event":"");
  const w=fmtWhen(it.date,it.type);
  const wf=DATA.workflows.find(x=>x.id===it.workflow_id);
  el.innerHTML=`
    <div class="top">
      <div>
        <div class="title">${esc(it.title)}</div>
        <div class="meta">
          <span class="pill ${it.type==="event"?"event":""}">${it.type}</span>
          ${w?`<span class="when ${w.cls}">${w.text}</span>`:""}
          ${showWf&&wf?`<span class="wf-tag">· ${esc(wf.name)}</span>`:""}
        </div>
        ${it.source?`<div class="src">${esc(it.source)}</div>`:""}
      </div>
      ${!showWf?`<div class="rank">${it.sort_order}</div>`:""}
    </div>`;
  return el;
}
function esc(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}

function renderTabs(){
  const t=document.getElementById("tabs"); t.innerHTML="";
  const mk=(id,name)=>{
    const b=document.createElement("button");
    b.className="tab"; b.textContent=name; b.setAttribute("role","tab");
    b.setAttribute("aria-selected",active===id);
    if(id!==AGENDA && hasNew(id)){const d=document.createElement("span");d.className="dot";b.appendChild(d);}
    b.onclick=()=>{active=id; if(id!==AGENDA) markSeen(id); render();};
    return b;
  };
  t.appendChild(mk(AGENDA,"This Week"));
  DATA.workflows.sort((a,b)=>a.sort_order-b.sort_order)
    .forEach(w=>t.appendChild(mk(w.id,w.name)));
}

function render(){
  document.getElementById("stamp").textContent=new Date().toLocaleString(undefined,{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
  renderTabs();
  const list=document.getElementById("list"); list.innerHTML="";

  if(active===AGENDA){
    const now=new Date(); const wk=new Date(); wk.setDate(now.getDate()+7);
    const due=DATA.items
      .filter(it=>it.date && new Date(it.date)<=wk)
      .sort((a,b)=>new Date(a.date)-new Date(b.date));
    if(!due.length){list.innerHTML=`<div class="empty">Nothing due in the next 7 days.<br>Enjoy it.</div>`;return;}
    let lastDay="";
    due.forEach(it=>{
      const dayKey=new Date(it.date).toLocaleDateString(undefined,{weekday:"long",day:"numeric",month:"short"});
      if(dayKey!==lastDay){const g=document.createElement("div");g.className="group-label";g.textContent=dayKey;list.appendChild(g);lastDay=dayKey;}
      list.appendChild(itemEl(it,true));
    });
    return;
  }

  const items=DATA.items.filter(it=>it.workflow_id===active).sort((a,b)=>a.sort_order-b.sort_order);
  if(!items.length){list.innerHTML=`<div class="empty">No open items in this flow.</div>`;return;}
  items.forEach(it=>list.appendChild(itemEl(it,false)));
}

el("refresh").onclick=load;
el("signout").onclick=signOut;
el("send-code").onclick=requestCode;
el("verify-code").onclick=verifyCode;
el("login-back").onclick=resetLoginUI;
el("login-email").addEventListener("keydown",e=>{if(e.key==="Enter")requestCode();});
el("login-code").addEventListener("keydown",e=>{if(e.key==="Enter")verifyCode();});
load();
</script>
</body>
</html>
